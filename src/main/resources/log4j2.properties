####################################
# Log4j2 Configuration
####################################

# ==========
# Properties
# ==========
property.basePath = TestOutput/logs

# ==========
# File Appender
# ==========
appender.file.type = File
appender.file.name = fileAppender
appender.file.fileName = ${basePath}/logs.log
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = [%p] %d{dd-MM-yyyy HH:mm:ss} [%t] [%c] - %msg%n
appender.file.filter.threshold.type = ThresholdFilter
# Log everything from DEBUG and above to file
appender.file.filter.threshold.level = debug

# ==========
# Console Appender
# ==========
appender.console.type = Console
appender.console.name = consoleAppender
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %highlight{[%p] %d{dd-MM-yyyy HH:mm:ss} [%t] [%c] - %msg}{FATAL=RED, ERROR=RED, WARN=YELLOW, INFO=GREEN, DEBUG=CYAN}
appender.console.filter.threshold.type = ThresholdFilter
# Only show INFO and above in console (less noisy)
appender.console.filter.threshold.level = info

# ==========
# Root Logger
# ==========
rootLogger.level = debug
rootLogger.appenderRefs = fileAppender, consoleAppender
rootLogger.appenderRef.fileAppender.ref = fileAppender
rootLogger.appenderRef.consoleAppender.ref = consoleAppender